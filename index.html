<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totem de Autoatendimento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-escuro: #00582C;
      --verde-medio:  #009640;
      --verde-tel:    #0E7C5A;
      --laranja:      #F07F1A;
      --laranja-dark: #d96c0a;
      --vermelho:     #CE2D22;
      --vermelho-dark:#b0241b;
      --cinza-inativo:#95A5A6;
      --bg:           #F5F6F5;
      --card:         #FFFFFF;
      --texto:        #243126;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(1200px 700px at 12% 0%, rgba(0,150,64,0.06), transparent 60%),
        radial-gradient(1000px 600px at 95% 100%, rgba(240,127,26,0.06), transparent 55%),
        var(--bg);
      color: var(--texto);
      overflow: hidden;
    }

    /* ===== Container em duas colunas ===== */
    .container {
      width: 96%;
      max-width: 1820px;
      height: 92vh;
      max-height: 1000px;
      background-color: var(--card);
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(0, 60, 30, 0.10), 0 2px 8px rgba(0,0,0,0.04);
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      overflow: hidden;
      text-align: left;
    }

    /* ===== Coluna esquerda (institucional) ===== */
    .brand-col {
      background:
        radial-gradient(800px 500px at 0% 0%, rgba(0,150,64,0.10), transparent 60%),
        linear-gradient(160deg, #ffffff 0%, #f3f8f4 100%);
      padding: 64px 56px;
      display: flex;
      flex-direction: column;
      gap: 36px;
      border-right: 1px solid rgba(0, 88, 44, 0.08);
    }

    .brand-logo {
      width: 100%;
      max-width: 460px;
      height: auto;
      object-fit: contain;
    }

    .welcome {
      margin-top: auto;
    }
    .welcome .eyebrow {
      display: inline-block;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--laranja);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .welcome h2 {
      font-size: clamp(38px, 3.4vw, 58px);
      font-weight: 700;
      line-height: 1.08;
      color: var(--verde-escuro);
    }
    .welcome p {
      margin-top: 18px;
      font-size: 24px;
      font-weight: 400;
      color: #56695b;
      max-width: 480px;
    }

    .phones {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 32px;
      border-top: 1px solid rgba(0, 88, 44, 0.10);
    }
    .phones .phones-label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7a8a7f;
    }
    .phone {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--verde-tel);
      font-size: clamp(34px, 2.8vw, 46px);
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .phone svg {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      fill: var(--verde-medio);
    }

    /* ===== Coluna direita (ação) ===== */
    .action-col {
      padding: 64px 64px 40px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 28px;
      min-width: 0;
    }

    .action-stack {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 28px;
      min-height: 0;
    }

    /* ===== Botões (touch) ===== */
    .options {
      display: flex;
      justify-content: center;
      align-items: stretch;
      width: 100%;
    }

    .option-button,
    .option-button-cancel {
      width: 100%;
      min-height: 96px;
      padding: 24px 48px;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: clamp(28px, 2.4vw, 40px);
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #fff;
      cursor: pointer;
      white-space: pre-line;
      line-height: 1.18;
      transition: background-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    /* CTA principal -> laranja */
    .option-button {
      background-color: var(--laranja);
      box-shadow: 0 10px 24px rgba(240, 127, 26, 0.30);
    }
    .option-button:hover:enabled {
      background-color: var(--laranja-dark);
      transform: scale(1.03);
    }
    .option-button:active:enabled {
      transform: scale(0.97);
      box-shadow: inset 0 6px 16px rgba(0,0,0,0.28);
    }

    /* Estado inativo */
    .option-button:disabled {
      background-color: var(--cinza-inativo);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.9;
    }

    /* Cancelar -> vermelho */
    .option-button-cancel {
      background-color: var(--vermelho);
      box-shadow: 0 10px 24px rgba(206, 45, 34, 0.28);
    }
    .option-button-cancel:hover:enabled {
      background-color: var(--vermelho-dark);
      transform: scale(1.03);
    }
    .option-button-cancel:active:enabled {
      transform: scale(0.97);
      box-shadow: inset 0 6px 16px rgba(0,0,0,0.30);
    }

    /* ===== Botões de pagamento (verde, com ícone) ===== */
    #novosBotoes {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 22px;
      width: 100%;
    }
    #novosBotoes.hidden { display: none; }

    #pix, #debito, #credito {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 180px;
      padding: 28px 16px;
      background-color: var(--verde-escuro);
      box-shadow: 0 10px 24px rgba(0, 88, 44, 0.26);
      font-size: clamp(24px, 1.8vw, 32px);
    }
    #pix svg, #debito svg, #credito svg {
      width: 64px;
      height: 64px;
      stroke: #fff;
      fill: none;
    }
    #pix:hover:enabled,
    #debito:hover:enabled,
    #credito:hover:enabled {
      background-color: var(--verde-medio);
      transform: scale(1.03);
    }

    /* ===== QR Code ===== */
    #qrCodeContainer {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCodeContainer.hidden { display: none; }
    #qrCodeContainer img {
      width: 360px !important;
      height: auto;
      border-radius: 12px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,88,44,0.10);
    }

    #cancelarBotao.hidden { display: none; }

    /* ===== Footer (status) ===== */
    .hidden { display: none; }

    .footer {
      margin-top: auto;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 28px;
      background: #f3f8f4;
      border: 1px solid rgba(0,88,44,0.10);
      border-radius: 16px;
      font-size: clamp(18px, 1.5vw, 26px);
      font-weight: 500;
      line-height: 1.3;
      color: var(--verde-escuro);
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- COLUNA ESQUERDA: institucional -->
    <div class="brand-col">
      <img class="brand-logo" src="assets/logo.png" alt="Liquigás">

      <div class="welcome">
        <span class="eyebrow">Autoatendimento</span>
        <h2>Bem-vindo ao Autoatendimento</h2>
        <p>Compre seu botijão de gás de forma rápida e segura, direto no totem.</p>
      </div>

      <div class="phones">
        <span class="phones-label">Central de atendimento</span>
        <div class="phone">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
          0800.541.2888
        </div>
        <div class="phone">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
          3479.2888
        </div>
      </div>
    </div>

    <!-- COLUNA DIREITA: área de ação -->
    <div class="action-col">

      <div class="action-stack">
        <div id="qrCodeContainer"></div>

        <div id="cancelarBotao">
          <button class="option-button-cancel" id="cancelar_pix">CANCELAR</button>
        </div>

        <div class="options" id="options-container">
          <button class="option-button" id="iniciar" disabled>INICIAR</button>
        </div>

        <div id="novosBotoes" class="hidden">
          <button class="option-button" id="pix">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2 20.8 12 12 20.8 3.2 12 12 3.2z" stroke-width="1.8" stroke-linejoin="round"></path><path d="M8.2 8.2 12 12l3.8-3.8M8.2 15.8 12 12l3.8 3.8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            PIX
          </button>
          <button class="option-button" id="debito">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke-width="1.8"></rect><path d="M3 9.5h18" stroke-width="1.8"></path><path d="M6.5 15.5h5" stroke-width="1.8" stroke-linecap="round"></path></svg>
            Débito
          </button>
          <button class="option-button" id="credito">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke-width="1.8"></rect><path d="M3 9.5h18" stroke-width="1.8"></path><path d="M6.5 15.5h3.5M13 15.5h4.5" stroke-width="1.8" stroke-linecap="round"></path></svg>
            Crédito
          </button>
        </div>
      </div>

      <div class="footer">Aguardando comunicação com Interface de Pagamento...</div>
    </div>

  </div>

 <script>
  const { ipcRenderer } = require('electron');
  const { v4: uuidv4 } = require('uuid');
  require('dotenv').config();

  const botaoIniciar = document.getElementById('iniciar');
   const botaoPix = document.getElementById('pix');
      const cancelarBotaoPix = document.getElementById('cancelarBotao');
     const qrcodePix = document.getElementById('qrCodeContainer');
    const botaoDebito = document.getElementById('debito');
     const botaoCredito = document.getElementById('credito');
   const optionsContainer = document.getElementById('options-container');

       cancelarBotaoPix.classList.add("hidden");

  let messageTimeout = 0;
  let token = process.env.TOKEN; //CLIENTE
  let pos = process.env.POS; //CLIENTE
  let url = `https://api.mercadopago.com/point/integration-api/devices/${pos}/payment-intents`;
  let urlPix = `https://api.mercadopago.com/v1/payments`;
  let value = 13000;
  //let value  100;

  function resetTimeout() {
    clearTimeout(messageTimeout);
    console.log("🟢 Timer reiniciado.");
    messageTimeout = setTimeout(handleTimeout, 30000);
  }

  // Evento de clique para publicar mensagem MQTT
  botaoIniciar.addEventListener('click', () => {
    ipcRenderer.send('mqtt-publish', 'central/1', 'INICIA');
  });

    cancelarBotaoPix.addEventListener('click', () => {
    ipcRenderer.send('mqtt-publish', 'central/1', 'Cancelando cobrança ....');
  });

     botaoPix.addEventListener('click', () => {
    ipcRenderer.send('mqtt-publish', 'central/1', 'PIX');
  });

    botaoDebito.addEventListener('click', () => {
    ipcRenderer.send('mqtt-publish', 'central/1', 'DEBITO');
  });

    botaoCredito.addEventListener('click', () => {
    ipcRenderer.send('mqtt-publish', 'central/1', 'CREDITO');
  });

    function handleTimeout() {
      //DISPARAR ALGUM SCRIPT DE RECONEXAO
      botaoIniciar.disabled = true;
      document.querySelector('.footer').innerText = "Comunicação com Interface de Pagamento Perdida\nTentando Reconectar, Por Favor, aguarde ...";
  }

  // Evento para processar mensagens MQTT recebidas
  ipcRenderer.on('mqtt-message', async (event, message) => {
    console.log("Mensagem recebida:", message);
    resetTimeout();

    // Se receber "INICIAR", habilita o botão
    if (message.trim() === "INICIAR") {
             cancelarBotaoPix.classList.add("hidden");
           botaoIniciar.style.display = "block"; // Mostra o botão principal
        novosBotoes.classList.add("hidden"); // Esconde os novos botões
         qrcodePix.classList.add("hidden"); // Esconde qrcode
      botaoIniciar.disabled = false;
      botaoIniciar.innerText = message;
      document.querySelector('.footer').innerText = "Toque em INICIAR para começar";
    }

    // Sem nenhum botijão cheio em estoque: bloqueia o início e avisa o cliente
    if (message.trim() === "SEM_ESTOQUE") {
      cancelarBotaoPix.classList.add("hidden");
      novosBotoes.classList.add("hidden");
      qrcodePix.classList.add("hidden");
      botaoIniciar.style.display = "block";
      botaoIniciar.disabled = true;
      botaoIniciar.innerText = "FORA DE SERVIÇO";
      document.querySelector('.footer').innerText =
        "Máquina temporariamente sem botijões disponíveis.\nProcure o atendente.";
      return;
    }

    if (message.includes("Escolha")) {
             cancelarBotaoPix.classList.add("hidden");
       qrcodePix.classList.add("hidden");
      document.querySelector('.footer').innerText = message;
  document.getElementById("iniciar").style.display = "none"; // Esconde o botão principal
            document.getElementById("novosBotoes").classList.remove("hidden"); // Mostra os novos botões
  }



    // Se receber uma dessas palavras, desabilita o botão
    if (/Cancelando|Erro|Expirado|Botijão|Central|Aguardando|Porta|porta/.test(message)) {
       qrcodePix.classList.add("hidden");
      cancelarBotaoPix.classList.add("hidden");
         if (message.includes("Aguardando")) {
         //cancelarBotaoPix.classList.remove("hidden");
         }

      if (message.includes("QRCode")) {
        console.log('mostra qrcode*******')
        qrcodePix.classList.remove("hidden");
      }
      botaoIniciar.style.display = "block"; // Mostra o botão principal
      novosBotoes.classList.add("hidden"); // Esconde os novos botões
      botaoIniciar.disabled = true;
      botaoIniciar.innerText = message;
      document.querySelector('.footer').innerText = "";
    }

    // Gera a cobranca a partir do metodo de pagamento e faz a requisição à API
        if (message.includes("DEBITO")) {
      console.log('debito aquii')
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body:

             //##DEBITO
          `{"amount":  ${value},"description":"Botijão",   "payment": {"type": "debit_card"},"additional_info":{"external_reference":"Totem Puro Gás","print_on_terminal":false}}`});

        if (!response.ok) throw new Error("Erro ao chamar a API");

        const data = await response.json();
        if (data.id) {
      localStorage.setItem("payment_id", data.id); // 🔥 Salva o ID no localStorage
      console.log("ID salvo no storage:", data.id);
    }
        console.log("Resposta da API:", data);
        console.log("ID ---> ", data.id);
      } catch (error) {
        console.error("Erro na requisição:", error);
      }
    }


    if (message.includes("CREDITO")) {
      console.log('credito aquii')
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body:

          //##CREDITO
          `{"amount":  ${value},"description":"Botijão",   "payment": { "installments":1,"installments_cost":"buyer", "type": "credit_card"},"additional_info":{"external_reference":"Totem Puro Gás","print_on_terminal":false}}`});

        if (!response.ok) throw new Error("Erro ao chamar a API");

        const data = await response.json();
        if (data.id) {
      localStorage.setItem("payment_id", data.id); // 🔥 Salva o ID no localStorage
      console.log("ID salvo no storage:", data.id);
    }
        console.log("Resposta da API:", data);
        console.log("ID ---> ", data.id);
      } catch (error) {
        console.error("Erro na requisição:", error);
      }
    }

        if (message.includes("PIX")) {
      console.log('pix aqui')
      try {
        const response = await fetch(urlPix, {
          method: "POST",
          headers: { "X-Idempotency-Key": uuidv4(), "Content-Type": "application/json", "Accept": "application/json", Authorization: `Bearer ${token}` },
          body:

         `{"transaction_amount": ${value/100}, "description": "Botijão", "payment_method_id": "pix","payer": {"email": "totem@totem.purogas.br"}}`});

        if (!response.ok) throw new Error("Erro ao chamar a API");

        const data = await response.json();
        if (data.id) {
      localStorage.setItem("payment_id", data.id); // 🔥 Salva o ID no localStorage
      console.log("ID salvo no storage:", data.id);
    }
        console.log("Resposta da API:", data);
        console.log("ID ---> ", data.id);

        // Pegando o valor do QR Code base64
    const qrCodeBase64 = data.point_of_interaction.transaction_data.qr_code_base64;

    if (qrCodeBase64) {
      // Renderizar na tela
      const imgElement = document.createElement("img");
      imgElement.src = `data:image/png;base64,${qrCodeBase64}`;
      imgElement.alt = "QR Code PIX";
      imgElement.style.width = "200px"; // Ajuste o tamanho conforme necessário

      document.getElementById("qrCodeContainer").innerHTML = ""; // Limpa antes de adicionar um novo QR Code
      document.getElementById("qrCodeContainer").appendChild(imgElement);
    }

      } catch (error) {
        console.error("Erro na requisição:", error);
      }
    }

     // Se receber "Cancelando", faz a requisição de cancelamento à API
    if (message.includes("Cancelando")) {
        cancelarBotaoPix.classList.add("hidden");
      const savedId = localStorage.getItem("payment_id"); // Recupera o ID salvo
  if (!savedId) {
    console.error("Nenhum ID de pagamento encontrado no storage.");
    return;
  }
      try {
        const response = await fetch(`${url}/${savedId}`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }
        });

        if (!response.ok) throw new Error("Erro ao chamar a API");

        const data = await response.json();
        console.log("Resposta da API:", data);
         localStorage.removeItem("payment_id");

      } catch (error) {
        console.error("Erro na requisição:", error);
      }
    };


  });


  ipcRenderer.on('webhook-message', (event, data) => {
    console.log("Mensagem do Webhook recebida:", data);

    if (data.mensagem.includes("Gerando")) {
        console.log("Mensagem contém 'Gerando', processando requisição...");
    }

    document.querySelector('.footer').innerText = `Webhook recebido: ${data.mensagem}`;
});

</script>

</body>
</html>
